name: Build and Release Windows

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # WICHTIG: Damit die Action Berechtigung hat, die .exe an das Release anzuhängen

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Node 24 (oder je nach Bedarf auf 20/22 änderbar)
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build & Publish Release
        # Nutzt den korrekten Publish Parameter.
        run: npm run build && npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
