name: Build and Release Linux

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # WICHTIG: Damit die Action Berechtigung hat, die Dateien an das Release anzuhängen

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Analog zur Windows- und Mac-Action
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Linux App
        # Wir bauen die Linux-Versionen (AppImage, deb, snap) und überlassen das Veröffentlichen der Action
        run: npm run build && npx electron-builder --linux -p never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.AppImage
            dist/*.deb
            dist/*.snap
            dist/*.yml
            dist/*.blockmap
